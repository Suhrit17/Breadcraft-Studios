<!DOCTYPE html>
<html lang="en">
<head>
  <title>Create Your Sticker | Breadcraft</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #fff8e1;
      margin: 0;
      padding: 20px;
    }
    h1 {
      color: #6b4f3b;
      text-align: center;
    }
    .container {
      max-width: 600px;
      margin: auto;
      background-color: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }
    input[type="text"], textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    input[type="file"] {
      margin-top: 10px;
    }
    button {
      margin-top: 20px;
      background-color: #ff6f61;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 1em;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>
<style>
  nav {
    background-color: #d6a96a;
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 10px;
  }
  nav a {

    font-weight: bold;

  /* your other CSS here */

<nav>

  <h1>Create Your Sticker</h1>
  <div class="container">
    <h2>Draw Your Sticker Design</h2>
    <canvas id="drawingCanvas" width="400" height="400" style="border:1px solid #000;"></canvas>
    <br>
    <button onclick="clearCanvas()">Clear</button>

    <p>Draw your sticker or upload a design below!</p>

    <form action="https://formsubmit.co/suhrit.byra@gmail.com" method="POST" enctype="multipart/form-data" onsubmit="captureDrawing()">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_next" value="https://yourwebsite.com/thankyou.html">
      <input type="hidden" name="drawing" id="drawingData">

      <label for="upload">Upload Your Sticker Design:</label>
      <input type="file" id="upload" name="upload" accept="image/*">

      <label for="name">Sticker Name:</label>
      <input type="text" id="name" name="name" placeholder="Enter sticker name" required>

      <label for="desc">Description:</label>
      <textarea id="desc" name="desc" rows="4" placeholder="Describe your sticker idea" required></textarea>

      <button type="submit">Submit Design</button>
    </form>
  </div>

  <script>
    // Setup canvas
    let canvas = document.getElementById("drawingCanvas");
    let ctx = canvas.getContext("2d");
    let drawing = false;

    // Drawing events
    canvas.onmousedown = () => drawing = true;
    canvas.onmouseup = () => {
      drawing = false;
      ctx.beginPath();
    };
    canvas.onmousemove = draw;

    function draw(e) {
      if (!drawing) return;
      ctx.lineWidth = 2;
      ctx.lineCap = "round";
      ctx.strokeStyle = "#000";
      ctx.lineTo(e.offsetX, e.offsetY);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(e.offsetX, e.offsetY);
    }

    function clearCanvas() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function captureDrawing() {
      const imageData = canvas.toDataURL("image/png");
      document.getElementById("drawingData").value = imageData;
    }
  </script>
</body>
</html>
